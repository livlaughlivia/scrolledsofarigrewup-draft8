<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  /* ======================================
     ERA 1 — POST TEMPLATE
     Für jeden neuen Post nur src="..." ändern
     ====================================== */

  .post-wrapper {
    position: relative;
    width: 640px;
    height: 684px;
  }

  /* Hauptbild im Post-Frame */
  .insta-post img {
    width: 640px;
    height: 684px;
    object-fit: cover;
    display: block;
  }

  /* Floater: beide mit clip-path auf dasselbe Originalfoto */
  .floater {
    position: absolute;
    top: 0;
    left: 0;
    width: 640px;
    height: 684px;
    overflow: hidden;
  }

  .floater img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Floater 1 — Form rechts (era1-shape-18) */
  .floater1 {
    clip-path: url(#shape-18);
  }

  /* Floater 2 — Form links-unten (era1-shape-17) */
  .floater2 {
    clip-path: url(#shape-17);
  }
</style>
</head>
<body>

<!-- SVG-Definitionen: die beiden Blob-Formen, einmal definiert, nie wieder anfassen -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <!-- Shape 18: rechter Floater -->
    <clipPath id="shape-18" clipPathUnits="userSpaceOnUse">
      <path d="M577.64,226.82c-19.57-13.87-29.12-27.5-35.34-47.19-7.65-24.27-27.9-44.91-58.9-44.91s-61.17,33.14-61.17,61.17c0,16.15,6.38,28.79,21.42,43.75,11.11,11.05,19.44,32.12,13.01,50.5-6.2,17.72-21.59,31.58-46.84,30.67-38.56-1.38-51.85,35.19-51.85,51.85,0,23.15,17.46,51.85,51.85,51.85,5.03,0,11.4-1.28,17.02-3.02,7.41-2.28,16.85-.54,25.46,6.27,7.82,6.19,13.05,17.84,12.26,24.84-.54,4.79-.61,7.04-.61,10.01,0,23.38,14.46,41.56,41.56,41.56,17.07,0,41.56-11.4,41.56-41.56,0-20.39,12.89-33.11,25.08-41.56,11.97-8.31,34.77-13.14,53.94-3.52,4.46,2.24,9.3,4.13,14.23,5.66v-176.53c-27.39-1.42-43.24-6.09-62.68-19.87Z"/>
    </clipPath>
    <!-- Shape 17: linker Floater -->
    <clipPath id="shape-17" clipPathUnits="userSpaceOnUse">
      <path d="M208.73,547.36c-12.21.44-19.66-6.27-22.66-14.84-3.11-8.89.92-19.08,6.29-24.43,7.28-7.24,10.36-13.35,10.36-21.16,0-13.56-14.74-29.59-29.59-29.59s-24.79,9.98-28.49,21.72c-3,9.52-7.63,16.12-17.09,22.83-12.17,8.63-21.43,9.88-43.67,9.88-23.96,0-43.67,17.56-43.67,43.67,0,13.8,6.28,26.64,16.83,34.77h169.52c4.81-4.99,7.24-11.76,7.24-17.76,0-8.06-6.43-25.75-25.08-25.08Z"/>
    </clipPath>
  </defs>
</svg>

<!-- ======================================
     POST — nur src="..." ändern pro Post
     ====================================== -->
<div class="post-wrapper">

  <!-- Hauptbild -->
  <div class="insta-post">
    <img src="img/2016/dein-foto.jpg">
  </div>

  <!-- Floater 1 (rechts) — selbes Foto, automatisch in Shape 18 geschnitten -->
  <div class="floater1 floater" attr-float-speed-y="-1000" attr-float-speed-x="5" attr-scale="0.5">
    <img src="img/2016/dein-foto.jpg">
  </div>

  <!-- Floater 2 (links-unten) — selbes Foto, automatisch in Shape 17 geschnitten -->
  <div class="floater2 floater" attr-float-speed-y="-300" attr-float-speed-x="5" attr-scale="0.5">
    <img src="img/2016/dein-foto.jpg">
  </div>

  <!-- Post-Frame (bleibt immer gleich) -->
  <div class="insta-post ig-frame">
    <img src="img/2016/TEST-SHAPES/20260526-test-shapes-05.webp">
  </div>

</div>

</body>
</html>
